repository_type: pipeline

nf_core_version: 4.0.2

lint:
  files_unchanged:
    - .prettierignore
    - assets/sendmail_template.txt
    - .prettierignore
    - docs/CONTRIBUTING.md
    - CODE_OF_CONDUCT.md
    - assets/nf-core-mtbc-resistotyper-nf_logo_light.png
    - docs/images/nf-core-mtbc-resistotyper-nf_logo_light.png
    - docs/images/nf-core-mtbc-resistotyper-nf_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - assets/multiqc_config.yml
    - assets/email_template.html
    - assets/sendmail_template.txt
    - assets/email_template.txt
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - CODE_OF_CONDUCT.md
    - assets/nf-core-mtbc-resistotyper-nf_logo_light.png
    - docs/images/nf-core-mtbc-resistotyper-nf_logo_light.png
    - docs/images/nf-core-mtbc-resistotyper-nf_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml

template:
  org: mycobactopia-org
  name: mtbc-resistotyper-nf
  description: "MTBC resistance-prediction building block \u2014 runs published predictors\
    \ (TB-Profiler, Mykrobe, \u2026) over variant calls and reserves an ML-backend\
    \ slot. First upstream integration is XBS."
  author: Abhinav Sharma
  version: 0.1.0dev
  force: true
  outdir: /Users/abhi/projects/PHD-pub-magma-pipeline/analysis/pipelines/mtbc-resistotyper-nf
  skip_features:
    - igenomes
    - multiqc
    - fastqc
    - seqera_platform
    - gpu
    - codespaces
    - vscode
    - rocrate
    - email
  is_nfcore: false
